# Photography metadata
# ---
# To add a new photo:
#   1. Drop the image file into images/photography/
#   2. Add an entry below with the exact filename
#
# All fields except 'file' are optional.
# If you skip an entry, the photo still appears but without a caption.
#
# Example:
# - file: "my-bird.jpg"
#   title: "Kingfisher"
#   description: "Perched above a stream, waiting to dive."
#   location: "Bavaria, Germany"
#   date: "June 2024"

